<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR Service</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#1a1a2e; --surface:#16213e; --surface2:#0f3460;
  --accent:#e94560; --text:#eee; --text2:#aaa;
  --border:#2a2a4a; --success:#4ecca3; --error:#e94560;
}
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
header { display:flex; align-items:center; justify-content:space-between; padding:12px 20px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
header h1 { font-size:1.3rem; font-weight:600; }
.controls { display:flex; gap:10px; align-items:center; }
.controls select { background:var(--surface2); color:var(--text); border:1px solid var(--border); padding:6px 10px; border-radius:6px; font-size:0.9rem; }
.main { display:flex; flex:1; overflow:hidden; }
.sidebar { width:280px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; }
.section-header { padding:8px 12px; font-size:0.8rem; color:var(--text2); text-transform:uppercase; display:flex; justify-content:space-between; align-items:center; }
.section-header button { background:transparent; color:var(--text); border:1px solid var(--border); border-radius:4px; padding:2px 8px; cursor:pointer; }
.section-header select { background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:4px; padding:2px 6px; font-size:0.8rem; }
.proj-list, .doc-list { padding:4px 8px; overflow-y:auto; }
.proj-list { max-height:200px; }
.doc-list { flex:1; }
.project-item, .doc-item { padding:8px 10px; border-radius:6px; cursor:pointer; display:flex; align-items:center; gap:6px; margin-bottom:2px; font-size:0.9rem; }
.project-item:hover, .doc-item:hover { background:var(--surface2); }
.project-item.active, .doc-item.active { background:var(--surface2); border:1px solid var(--accent); }
.proj-count { color:var(--text2); margin-left:auto; }
.format-badge { font-size:0.7rem; color:var(--text2); border:1px solid var(--border); border-radius:3px; padding:1px 5px; text-transform:uppercase; margin-left:auto; }
.page-counter, .elapsed { font-size:0.7rem; color:var(--text2); margin-left:6px; white-space:nowrap; }
.doc-item .progress-bar, .doc-item .spinner { margin-left:8px; }
.proj-menu, .doc-menu { color:var(--text2); cursor:pointer; padding:0 4px; }
.doc-menu.disabled { opacity:0.3; cursor:default; }
.dropzone { margin:8px; padding:24px 16px; border:2px dashed var(--border); border-radius:10px; text-align:center; color:var(--text2); cursor:pointer; font-size:0.85rem; }
.dropzone:hover, .dropzone.drag-over { border-color:var(--accent); color:var(--text); }
.dropzone input { display:none; }
.content { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.preview-bar { display:flex; gap:8px; padding:10px 12px; overflow-x:auto; background:var(--surface); border-bottom:1px solid var(--border); min-height:90px; align-items:center; flex-shrink:0; }
.preview-bar img { height:70px; border-radius:4px; border:2px solid var(--border); object-fit:contain; background:#fff; cursor:pointer; transition:border-color 0.15s; }
.preview-bar img:hover { border-color:var(--accent); }
.preview-bar .spinner { margin:0 auto; }
.preview-tabs { display:flex; gap:0; padding:0 12px; background:var(--surface); border-bottom:1px solid var(--border); }
.preview-tabs button { background:transparent; color:var(--text2); border:none; padding:10px 16px; cursor:pointer; font-size:0.9rem; border-bottom:2px solid transparent; }
.preview-tabs button.active { color:var(--text); border-bottom-color:var(--accent); }
.result-area { flex:1; padding:20px; overflow-y:auto; }
.result-area pre { white-space:pre-wrap; word-wrap:break-word; font-size:0.85rem; line-height:1.5; font-family:'Cascadia Code','Fira Code',monospace; }
.result-area .rendered { line-height:1.6; }
.result-area .rendered table { border-collapse:collapse; margin:1em 0; }
.result-area .rendered th, .result-area .rendered td { border:1px solid var(--border); padding:6px 10px; }
.empty-state { color:var(--text2); text-align:center; padding:40px 20px; }
.download-bar { padding:12px; background:var(--surface); border-top:1px solid var(--border); display:flex; gap:10px; flex-shrink:0; }
.btn { background:var(--accent); color:#fff; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-size:0.9rem; }
.progress-bar { width:60px; height:6px; background:var(--surface2); border-radius:3px; overflow:hidden; margin-left:auto; }
.progress-fill { height:100%; background:var(--accent); }
.spinner { width:14px; height:14px; border:2px solid var(--text2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin-left:auto; }
@keyframes spin { to { transform: rotate(360deg); } }
#statusbar { display:flex; justify-content:space-between; align-items:center; padding:6px 12px; background:var(--surface); border-top:1px solid var(--border); font-size:0.75rem; color:var(--text2); flex-shrink:0; }
.sb-section { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
</style>
</head>
<body>

<header>
  <h1>OCR Service</h1>
  <div class="controls">
    <select id="lang-select"><option value="ru" selected>Русский</option><option value="en">English</option></select>
    <select id="format-select"><option value="md" selected>Markdown</option><option value="txt">Text</option><option value="docx">Word</option></select>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="section-header">Проекты <button id="proj-add-btn">+</button></div>
    <div class="proj-list" id="proj-list"></div>
    <div class="section-header">
      Документы
      <select id="sort-select">
        <option value="created-desc">Дата ↓</option>
        <option value="created-asc">Дата ↑</option>
        <option value="name-asc">Имя А-Я</option>
        <option value="name-desc">Имя Я-А</option>
        <option value="size-desc">Размер ↓</option>
        <option value="size-asc">Размер ↑</option>
      </select>
    </div>
    <div class="doc-list" id="doc-list"></div>
    <div class="dropzone" id="dropzone">
      Перетащите файлы<br>или нажмите для выбора
      <input type="file" id="file-input" multiple accept=".pdf,.png,.jpg,.jpeg,.bmp,.tiff,.tif,.webp">
    </div>
  </div>

  <div class="content">
    <div class="preview-bar" id="preview-bar" style="display:none;"></div>
    <div class="preview-tabs">
      <button id="tab-source" class="active">Source</button>
      <button id="tab-rendered">Rendered</button>
    </div>
    <div class="result-area" id="result-area">
      <div class="empty-state">Выберите документ для просмотра результата</div>
    </div>
    <div class="download-bar">
      <button class="btn" id="download-btn">Скачать</button>
      <button class="btn" id="copy-btn">Копировать</button>
      <button class="btn" id="batch-zip-btn">Скачать всё (ZIP)</button>
      <span id="copy-toast" style="color:var(--success);font-size:0.85rem;display:none;">Скопировано</span>
    </div>
  </div>
</div>

<div id="statusbar"></div>

<script type="module" src="/static/js/app.js"></script>
</body>
</html>
